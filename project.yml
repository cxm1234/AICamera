name: AICamera
options:
  bundleIdPrefix: com.aicamera
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES
    ENABLE_BITCODE: NO
    OTHER_SWIFT_FLAGS: "-warnings-as-errors"
configs:
  Debug: debug
  Release: release
targets:
  AICamera:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AICamera
        excludes:
          - "**/.DS_Store"
    resources:
      - path: AICamera/Resources/Assets.xcassets
    info:
      path: AICamera/Resources/Info.plist
      properties:
        CFBundleDisplayName: AI Camera
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
          - video-camera
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UIBackgroundModes: []
        NSCameraUsageDescription: "AI Camera 需要使用相机来拍照、滤镜与美颜实时预览。"
        NSMicrophoneUsageDescription: "AI Camera 在录像功能中可能需要使用麦克风（当前版本不强制）。"
        NSPhotoLibraryAddUsageDescription: "AI Camera 需要将拍摄的照片保存到你的相册。"
        NSPhotoLibraryUsageDescription: "AI Camera 需要访问相册以预览最近一张照片。"
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aicamera.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_HARDENED_RUNTIME: YES
